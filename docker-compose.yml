version: "3.9"

services:
  backend:
    build: ./backend
    container_name: sentri-backend
    environment:
      - AI_PROVIDER=${AI_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=3001
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
    ports:
      - "3001:3001"
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    shm_size: "256mb"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/dashboard').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: sentri-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: sentri-network
