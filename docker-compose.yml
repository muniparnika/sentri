# docker-compose.yml — Run the full Sentri stack.
#
# Local build:       docker compose up --build
# From GHCR images:  docker compose pull && docker compose up
#
# Frontend (nginx) proxies /api/* → backend:3001 automatically.
# Open http://localhost:3000 in your browser.
#
# ─── Database (INF-001) ───────────────────────────────────────────────────────
# By default Sentri uses SQLite (zero config, data in backend/data/sentri.db).
# To use PostgreSQL instead, uncomment the `postgres` service below and set
# DATABASE_URL on the backend service:
#
#   DATABASE_URL=postgres://sentri:sentri@postgres:5432/sentri
#
# Then: docker compose --profile postgres up --build

services:
  backend:
    image: ghcr.io/rameshbabuprudhvi/sentri-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentri-backend
    environment:
      - AI_PROVIDER=${AI_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3001
      - NODE_ENV=production
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      # SEC-002: Point at the frontend dist copied into the shared volume so
      # serveIndexWithNonce() can inject per-request CSP nonces into index.html.
      - SPA_INDEX_PATH=/usr/share/frontend/index.html
      # Uncomment to use PostgreSQL instead of SQLite:
      # - DATABASE_URL=postgres://sentri:sentri@postgres:5432/sentri
      # Uncomment to use Redis for rate limiting, token revocation, and SSE pub/sub:
      # - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    shm_size: "256mb"
    volumes:
      - frontend_dist:/usr/share/frontend:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/rameshbabuprudhvi/sentri-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: sentri-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - frontend_dist:/usr/share/frontend_dist

  # ── Optional Redis service (INF-002) ─────────────────────────────────────────
  # Activate with: docker compose --profile redis up
  # Set REDIS_URL on the backend service (see above).
  redis:
    image: redis:7-alpine
    container_name: sentri-redis
    profiles:
      - redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Optional PostgreSQL service (INF-001) ──────────────────────────────────
  # Activate with: docker compose --profile postgres up
  # Set DATABASE_URL on the backend service (see above).
  postgres:
    image: postgres:16-alpine
    container_name: sentri-postgres
    profiles:
      - postgres
    environment:
      POSTGRES_USER: sentri
      POSTGRES_PASSWORD: sentri
      POSTGRES_DB: sentri
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentri"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  default:
    name: sentri-network

volumes:
  pgdata:
  frontend_dist:
