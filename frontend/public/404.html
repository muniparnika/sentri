<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sentri</title>
    <script>
      // GitHub Pages SPA redirect — converts the 404 path into a query string
      // so index.html can restore it via sessionStorage + replaceState.
      // See: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // keep '/sentri' prefix
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
