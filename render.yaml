services:
  - type: web
    name: sentri
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # For SQLite on Render, keep DB_PATH on the mounted persistent disk.
      - key: DB_PATH
        value: /app/backend/data/sentri.db
      # Optional: switch to managed Postgres instead of SQLite disk storage.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: sentri-postgres
      #     property: connectionString
    disk:
      name: sentri-data
      mountPath: /app/backend/data
      sizeGB: 1

# databases:
