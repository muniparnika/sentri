name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — Install, Test & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        # Use npm install (not npm ci) because there is no package-lock.json yet
        run: npm install

      - name: Syntax check all source files
        run: find src -name '*.js' -exec node --check {} +

      - name: Run unit & integration tests
        run: npm test

      - name: Generate JSDoc (validates all doc comments)
        run: npm run docs

      - name: Smoke test — server starts and responds
        run: |
          node src/index.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait up to 20s for server (use /health which is public)
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ Server is up"
              break
            fi
            echo "Waiting ($i/10)..."
            sleep 2
          done

          # Register a test user and login (cookie-based auth)
          COOKIE_JAR=$(mktemp)
          curl -sf -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Bot","email":"ci@test.local","password":"CiTestPass123!"}' \
            | grep -q "Account created" && echo "✅ POST /api/auth/register OK"

          # Login — JWT is set as HttpOnly cookie, not in response body.
          # Use -c to save cookies (access_token, _csrf) to a jar file.
          curl -sf -c "$COOKIE_JAR" -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.local","password":"CiTestPass123!"}' \
            | grep -q '"user"' && echo "✅ POST /api/auth/login OK"

          # Extract CSRF token from cookie jar for mutating requests
          CSRF=$(grep '_csrf' "$COOKIE_JAR" | awk '{print $NF}')

          # Verify authenticated endpoints (use -b to send cookies)
          curl -sf -b "$COOKIE_JAR" http://localhost:3001/api/dashboard | grep -q "totalProjects" && echo "✅ /api/dashboard OK"
          curl -sf -b "$COOKIE_JAR" http://localhost:3001/api/projects | grep -q "\[\]" && echo "✅ /api/projects OK"

          PROJ=$(curl -sf -b "$COOKIE_JAR" -X POST http://localhost:3001/api/projects \
            -H "Content-Type: application/json" \
            -H "X-CSRF-Token: $CSRF" \
            -d '{"name":"CI Test","url":"https://example.com"}')
          echo "$PROJ" | grep -q '"name":"CI Test"' && echo "✅ POST /api/projects OK"

          # Verify unauthenticated access is blocked
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/dashboard)
          [ "$HTTP_CODE" = "401" ] && echo "✅ Unauthenticated /api/dashboard returns 401" || echo "❌ Expected 401, got $HTTP_CODE"

          kill $SERVER_PID
        env:
          ANTHROPIC_API_KEY: sk-ant-placeholder-for-ci
          PORT: 3001

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build (catches JSX errors, bad imports, missing files)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ── Docs (VitePress + JSDoc assembly) ────────────────────────────────────
  docs:
    name: Docs — VitePress Build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Generate JSDoc
        working-directory: backend
        run: npx jsdoc -c jsdoc.json

      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Copy JSDoc output into VitePress public folder
        run: |
          mkdir -p docs/public/jsdoc
          cp -r backend/docs-api/* docs/public/jsdoc/

      - name: Build VitePress
        working-directory: docs
        run: npm run build

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker — Build Both Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: sentri-backend:ci
          # GitHub Actions cache — speeds up repeat builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test backend container (mirrors Render)
        run: |
          docker run -d --name sentri-ci \
            -e ANTHROPIC_API_KEY=sk-ant-placeholder-for-ci \
            -e PORT=3001 \
            -p 3001:3001 \
            sentri-backend:ci

          # Wait for the container to become healthy (up to 30s, use /health which is public)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "✅ Backend container is healthy"
              break
            fi
            echo "Waiting ($i/15)..."
            sleep 2
          done

          # Register + login (cookie-based auth)
          COOKIE_JAR=$(mktemp)
          curl -sf -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Bot","email":"ci@test.local","password":"CiTestPass123!"}'

          curl -sf -c "$COOKIE_JAR" -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.local","password":"CiTestPass123!"}' > /dev/null

          curl -sf -b "$COOKIE_JAR" http://localhost:3001/api/dashboard \
            | grep -q "totalProjects" \
            && echo "✅ /api/dashboard OK" \
            || (docker logs sentri-ci && exit 1)

          docker stop sentri-ci

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: sentri-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
