name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Use npm install (not npm ci) because there is no package-lock.json yet
        run: npm install

      - name: Syntax check all source files
        run: node --check src/index.js src/crawler.js src/testRunner.js src/db.js

      - name: Smoke test — server starts and responds
        run: |
          node src/index.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait up to 20s for server
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3001/api/dashboard > /dev/null 2>&1; then
              echo "✅ Server is up"
              break
            fi
            echo "Waiting ($i/10)..."
            sleep 2
          done

          # Verify endpoints
          curl -sf http://localhost:3001/api/dashboard | grep -q "totalProjects" && echo "✅ /api/dashboard OK"
          curl -sf http://localhost:3001/api/projects | grep -q "\[\]" && echo "✅ /api/projects OK"

          PROJ=$(curl -sf -X POST http://localhost:3001/api/projects \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test","url":"https://example.com"}')
          echo "$PROJ" | grep -q '"name":"CI Test"' && echo "✅ POST /api/projects OK"

          kill $SERVER_PID
        env:
          ANTHROPIC_API_KEY: sk-ant-placeholder-for-ci
          PORT: 3001

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build (catches JSX errors, bad imports, missing files)
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker — Build Both Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: sentri-backend:ci
          # GitHub Actions cache — speeds up repeat builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: sentri-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
