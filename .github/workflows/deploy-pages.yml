name: Deploy to GitHub (Pages + Container Registry)

# Deploys:
#   1. Frontend → GitHub Pages (static SPA)
#   2. Backend + Frontend → GHCR as Docker images (full-stack)
#
# GitHub Pages serves the frontend only — API calls need the backend
# running separately (docker compose up, or pull from ghcr.io).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 1. Build & deploy frontend + docs + JSDoc to GitHub Pages ───────────────
  pages:
    name: GitHub Pages — Frontend + Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Build frontend SPA ──────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend with GitHub Pages base path
        working-directory: frontend
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}

      # ── Generate JSDoc (backend API docs) ───────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Generate JSDoc
        working-directory: backend
        run: npx jsdoc -c jsdoc.json

      # ── Build VitePress docs ────────────────────────────────────────────────
      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Copy JSDoc output into VitePress public folder
        run: |
          mkdir -p docs/public/jsdoc
          cp -r backend/docs-api/* docs/public/jsdoc/

      - name: Build VitePress
        working-directory: docs
        run: npm run build

      # ── Merge all outputs into a single deploy folder ───────────────────────
      #   /sentri/          → frontend SPA
      #   /sentri/docs/     → VitePress guide + API reference
      #   /sentri/docs/jsdoc/ → JSDoc auto-generated code docs
      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp -r frontend/dist/* _site/
          mkdir -p _site/docs
          cp -r docs/.vitepress/dist/* _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 2. Build & push Docker images to GHCR ─────────────────────────────────
  docker-backend:
    name: GHCR — Backend Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-frontend:
    name: GHCR — Frontend Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
