name: CD — Deploy Pages & Push Images

# Single deploy workflow triggered on push to main:
#   1. GitHub Pages  — Frontend SPA + VitePress docs + JSDoc
#   2. GHCR          — Backend & Frontend Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: write

concurrency:
  group: cd
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/sentri-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/sentri-frontend

jobs:
  # ── 1. GitHub Pages — Frontend + Docs ──────────────────────────────────────
  pages:
    name: GitHub Pages — Frontend + Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Build frontend SPA ──────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend with GitHub Pages base path
        working-directory: frontend
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_API_URL: ${{ vars.VITE_API_URL || '' }}
          VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID || '' }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || '' }}

      # ── Generate JSDoc (backend API docs) ───────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Generate JSDoc
        working-directory: backend
        run: npx jsdoc -c jsdoc.json

      # ── Build VitePress docs ────────────────────────────────────────────────
      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Copy JSDoc output into VitePress public folder
        run: |
          mkdir -p docs/public/jsdoc
          cp -r backend/docs-api/* docs/public/jsdoc/

      - name: Build VitePress
        working-directory: docs
        run: npm run build

      # ── Merge all outputs into a single deploy folder ───────────────────────
      #   /sentri/          → frontend SPA
      #   /sentri/docs/     → VitePress guide + API reference
      #   /sentri/docs/jsdoc/ → JSDoc auto-generated code docs
      - name: Assemble Pages output
        run: |
          mkdir -p _site
          cp -r frontend/dist/* _site/
          mkdir -p _site/docs
          cp -r docs/.vitepress/dist/* _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── 2. Docker — Build & Push to GHCR ──────────────────────────────────────
  docker:
    name: Docker — Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image tags
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Frontend image tags
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image URLs
        run: |
          echo "✅ Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "✅ Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo ""
          echo "Pull with:"
          echo "  docker pull ${{ env.BACKEND_IMAGE }}:latest"
          echo "  docker pull ${{ env.FRONTEND_IMAGE }}:latest"
